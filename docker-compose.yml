services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-syukatsu}
      POSTGRES_USER: ${DB_USER:-syukatsu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-syukatsu_password}
    ports:
      - "${DB_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-syukatsu_user} -d ${DB_NAME:-syukatsu}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
